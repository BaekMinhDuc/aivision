
# Brain-tumor dataset by AIVision
# Documentation: https://docs.aivision.com/datasets/detect/brain-tumor
# Example usage: aivi train data=brain-tumor.yaml
# parent
# ├── aivision
# └── datasets
#     └── brain-tumor ← downloads here (4.21 MB)

# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
path: brain-tumor # dataset root dir
train: images/train # train images (relative to 'path') 893 images
val: images/val # val images (relative to 'path') 223 images

# Classes
names:
  0: negative
  1: positive

# Download script/URL (optional)
download: https://github.com/aivision/assets/releases/download/v0.0.0/brain-tumor.zip
